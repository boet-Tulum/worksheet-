async function sbGet(key) {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/kayuca_store?key=eq.${encodeURIComponent(key)}&select=value`, {
      headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
    });
    const data = await r.json();
    if (data?.[0]?.value) { localStorage.setItem(key, data[0].value); return data[0].value; }
    return localStorage.getItem(key);
  } catch { return localStorage.getItem(key); }
}

async function sbSet(key, value) {
  try {
    localStorage.setItem(key, value);
    await fetch(`${SUPABASE_URL}/rest/v1/kayuca_store`, {
      method: "POST",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json",
        "Prefer": "resolution=merge-duplicates"
      },
      body: JSON.stringify({ key, value, updated_at: new Date().toISOString() })
    });
  } catch { localStorage.setItem(key, value); }
}

async function sbGetAll() {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/kayuca_store?select=key,value`, {
      headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
    });
    const data = await r.json();
    if (Array.isArray(data)) {
      data.forEach(row => { try { localStorage.setItem(row.key, row.value); } catch {} });
    }
    return data;
  } catch { return []; }
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
